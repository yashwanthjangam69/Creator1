<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Audit — Creator Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="metrics.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{ margin:0; padding:0; box-sizing:border-box; }

:root{
  --bg: #f0f5fb;
  --white: #ffffff;
  --blue: #2f6bcd;
  --blue-deep: #0b487f;
  --blue-light: #e8f0fc;
  --blue-mid: #b8cef5;
  --text: #1a2540;
  --muted: #0b487f;
  --border: #dce8f8;
  --green: #2e9e6b;
  --green-bg: #f0faf6;
  --green-border: #b6e8d2;
  --orange: #e07a2f;
  --red: #e05c5c;
}

body{
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

.bg-orb{ position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(60px); }
.bg-orb-1{ width:400px; height:400px; background:rgba(47,107,205,0.07); top:-100px; right:-100px; animation:float1 8s ease-in-out infinite; }
.bg-orb-2{ width:300px; height:300px; background:rgba(11,72,127,0.05); bottom:100px; left:-80px; animation:float2 10s ease-in-out infinite; }
@keyframes float1{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,20px)} }
@keyframes float2{ 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }

.nav{
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 20px 0; position:relative; z-index:10;
}
.nav-back{
  display:flex; align-items:center; gap:8px; font-size:14px;
  color:var(--muted); cursor:pointer; background:none; border:none;
  font-family:'DM Sans',sans-serif; transition:color 0.2s;
}
.nav-back:hover{ color:var(--text); }
.nav-title{ font-family:'Playfair Display',serif; font-size:16px; font-weight:600; color:var(--text); }

.container{ max-width:480px; margin:0 auto; padding:0 16px; position:relative; z-index:1; }

.loading-wrap{ display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:20px; }
.loading-spinner{ width:40px; height:40px; border:3px solid var(--blue-light); border-top-color:var(--blue); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin{ to{transform:rotate(360deg)} }
.loading-text{ font-family:'Playfair Display',serif; font-size:18px; color:var(--text); }
.loading-sub{ font-size:13px; color:var(--muted); }

/* Hero */
.audit-hero{ padding:32px 0 24px; animation:fadeUp 0.6s ease both; }
.audit-eyebrow{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
.audit-title{ font-family:'Playfair Display',serif; font-size:28px; font-weight:700; line-height:1.15; color:var(--text); }
.audit-title em{ font-style:italic; color:var(--blue); }
.audit-based{ font-size:12px; color:var(--muted); margin-top:10px; }

/* Section */
.section{ margin-bottom:28px; }
.section-head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.section-icon{ width:32px; height:32px; border-radius:9px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:15px; }
.section-title{ font-family:'Playfair Display',serif; font-size:17px; font-weight:600; color:var(--text); }

/* Metric grid */
.metric-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.metric-card{ background:var(--white); border:1px solid var(--border); border-radius:16px; padding:18px 16px; box-shadow:0 2px 12px rgba(47,107,205,0.05); }
.metric-card.full{ grid-column:span 2; }
.metric-value{ font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:var(--text); line-height:1; }
.metric-value.blue{ color:var(--blue); }
.metric-value.green{ color:var(--green); }
.metric-value.orange{ color:var(--orange); }
.metric-label{ font-size:11px; color:var(--muted); margin-top:6px; text-transform:uppercase; letter-spacing:0.06em; }
.metric-context{ font-size:12px; color:var(--muted); margin-top:6px; line-height:1.4; font-weight:300; }

/* Hashtags */
.hashtag-cloud{ display:flex; flex-wrap:wrap; gap:8px; }
.hashtag-pill{ background:var(--white); border:1px solid var(--border); border-radius:100px; padding:6px 14px; font-size:13px; color:var(--blue-deep); transition:all 0.2s; }
.hashtag-pill:hover{ background:var(--blue-light); border-color:var(--blue-mid); }
.hashtag-pill .count{ font-size:10px; color:var(--muted); margin-left:4px; }

/* Best post */
.post-card{ background:var(--white); border:1px solid var(--border); border-radius:16px; padding:16px; display:flex; gap:14px; box-shadow:0 2px 8px rgba(47,107,205,0.04); }
.post-thumb{ width:64px; height:64px; border-radius:10px; object-fit:cover; flex-shrink:0; }
.post-thumb-placeholder{ width:64px; height:64px; border-radius:10px; background:var(--blue-light); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.post-info{ flex:1; min-width:0; }
.post-type-badge{ display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; padding:3px 8px; border-radius:100px; margin-bottom:6px; }
.post-type-badge.video{ background:#fde8f4; color:#c0396e; }
.post-type-badge.image{ background:var(--blue-light); color:var(--blue); }
.post-type-badge.sidecar{ background:#e8fdf0; color:#2a8a55; }
.post-caption{ font-size:13px; color:var(--text); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:8px; }
.post-stats{ display:flex; gap:12px; }
.post-stat{ font-size:12px; color:var(--muted); display:flex; align-items:center; gap:3px; }
.post-stat span{ font-weight:500; color:var(--text); }

/* Growth */
.growth-card{ background:var(--white); border:1px solid var(--border); border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(47,107,205,0.05); }
.growth-pending{ background:var(--blue-light); border:1px solid var(--blue-mid); border-radius:12px; padding:16px; text-align:center; }
.growth-pending-title{ font-size:13px; font-weight:500; color:var(--blue-deep); margin-bottom:4px; }
.growth-pending-sub{ font-size:12px; color:var(--muted); line-height:1.5; }
.growth-row{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
.growth-row:last-child{ border-bottom:none; }
.growth-key{ font-size:13px; color:var(--muted); }
.growth-val{ font-size:15px; font-weight:600; color:var(--text); }
.growth-val.up{ color:var(--green); }
.growth-val.down{ color:var(--red); }
.growth-val.neutral{ color:var(--muted); }

/* Vikram CTA */
.vikram-cta{
  background:linear-gradient(135deg, var(--blue-deep), var(--blue));
  border-radius:20px; padding:24px; position:relative; overflow:hidden;
}
.vikram-cta::before{
  content:''; position:absolute; top:-40px; right:-40px;
  width:160px; height:160px; background:rgba(255,255,255,0.06); border-radius:50%;
}
.vikram-cta::after{
  content:''; position:absolute; bottom:-50px; left:-30px;
  width:200px; height:200px; background:rgba(255,255,255,0.04); border-radius:50%;
}
.vikram-cta-label{ font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-bottom:8px; position:relative; z-index:1; }
.vikram-cta-title{ font-family:'Playfair Display',serif; font-size:22px; font-weight:600; color:white; margin-bottom:8px; position:relative; z-index:1; line-height:1.3; }
.vikram-cta-desc{ font-size:13px; color:rgba(255,255,255,0.75); line-height:1.6; margin-bottom:20px; position:relative; z-index:1; font-weight:300; }
.vikram-cta-btn{
  display:inline-flex; align-items:center; gap:8px;
  background:white; color:var(--blue-deep); border:none;
  padding:13px 22px; border-radius:10px; font-family:'DM Sans',sans-serif;
  font-size:14px; font-weight:600; cursor:pointer;
  transition:opacity 0.2s, transform 0.15s; position:relative; z-index:1;
}
.vikram-cta-btn:hover{ opacity:0.92; transform:translateY(-1px); }

@keyframes fadeUp{ from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.section:nth-child(1){ animation:fadeUp 0.5s 0.1s ease both; }
.section:nth-child(2){ animation:fadeUp 0.5s 0.15s ease both; }
.section:nth-child(3){ animation:fadeUp 0.5s 0.2s ease both; }
.section:nth-child(4){ animation:fadeUp 0.5s 0.25s ease both; }
.section:nth-child(5){ animation:fadeUp 0.5s 0.3s ease both; }
.section:nth-child(6){ animation:fadeUp 0.5s 0.35s ease both; }
.section:nth-child(7){ animation:fadeUp 0.5s 0.38s ease both; }

</style>
</head>

<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="nav">
  <button class="nav-back" onclick="window.location='dashboard.html'">← Back</button>
  <div class="nav-title">Profile Audit</div>
  <div style="width:60px"></div>
</div>

<div class="container">
  <div id="content">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <div class="loading-text">Analysing your profile</div>
      <div class="loading-sub">Crunching your last 10 posts...</div>
    </div>
  </div>
</div>

<script>

async function init(){
  const { data: sessionData } = await client.auth.getSession()
  if(!sessionData.session){ window.location='index.html'; return }

  const user = sessionData.session.user

  const { data: profile } = await client
    .from('profiles')
    .select('name, instagram')
    .eq('id', user.id)
    .single()

  if(!profile){ window.location='dashboard.html'; return }

  const [metrics, growth] = await Promise.all([
    getMetrics(user.id),
    getGrowthMetrics(user.id)
  ])

  if(!metrics){
    document.getElementById('content').innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--muted)">No post data found. Please go back and refresh.</div>`
    return
  }

  renderAudit(profile, metrics, growth)
}

function formatNum(n){
  if(!n) return '0'
  if(n >= 1000000) return (n/1000000).toFixed(1)+'M'
  if(n >= 1000) return (n/1000).toFixed(1)+'K'
  return n.toLocaleString()
}

function formatDate(d){
  return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
}

function changeArrow(val){
  if(val === null || val === undefined) return ''
  if(val > 0) return '↑'
  if(val < 0) return '↓'
  return '→'
}

function changeClass(val){
  if(val === null || val === undefined) return 'neutral'
  if(val > 0) return 'up'
  if(val < 0) return 'down'
  return 'neutral'
}

function getTypeEmoji(type){
  if(type==='Video') return '🎬'
  if(type==='Image') return '📸'
  if(type==='Sidecar') return '🖼️'
  return '📄'
}

function renderGrowthSection(growthData, label){
  if(!growthData) return `<div class="growth-pending"><div class="growth-pending-title">Not enough data yet</div><div class="growth-pending-sub">Keep using Creator Intelligence and your ${label} report will appear here.</div></div>`

  if(!growthData.qualified){
    return `
      <div class="growth-pending">
        <div class="growth-pending-title">${growthData.daysLeft} more days to go</div>
        <div class="growth-pending-sub">Your ${label} report will be ready on <strong>${formatDate(growthData.availableOn)}</strong>. Come back then to see your growth.</div>
      </div>
    `
  }

  return `
    <div class="growth-card">
      <div class="growth-row">
        <span class="growth-key">Follower Change</span>
        <span class="growth-val ${changeClass(growthData.followerChange)}">${changeArrow(growthData.followerChange)} ${Math.abs(growthData.followerChange)} (${Math.abs(growthData.followerChangePct)}%)</span>
      </div>
      <div class="growth-row">
        <span class="growth-key">Avg Likes Now</span>
        <span class="growth-val">${growthData.avgLikesNow !== null ? formatNum(growthData.avgLikesNow) : '—'}</span>
      </div>
      <div class="growth-row">
        <span class="growth-key">Avg Likes Before</span>
        <span class="growth-val">${growthData.avgLikesPrev !== null ? formatNum(growthData.avgLikesPrev) : '—'}</span>
      </div>
      ${growthData.avgLikesChange !== null ? `
      <div class="growth-row">
        <span class="growth-key">Likes Change</span>
        <span class="growth-val ${changeClass(growthData.avgLikesChange)}">${changeArrow(growthData.avgLikesChange)} ${Math.abs(growthData.avgLikesChange)}</span>
      </div>` : ''}
      <div class="growth-row">
        <span class="growth-key">Posts Published</span>
        <span class="growth-val">${growthData.postsThisWeek !== undefined ? growthData.postsThisWeek : growthData.postsThisMonth}</span>
      </div>
    </div>
  `
}

function renderAudit(profile, metrics, growth){
  const firstName = profile.name ? profile.name.split(' ')[0] : 'Creator'

  document.getElementById('content').innerHTML = `

    <div class="audit-hero">
      <div class="audit-eyebrow">Profile Audit</div>
      <div class="audit-title">Here's how <em>${firstName}</em><br>is performing.</div>
      <div class="audit-based">Based on your last ${metrics.totalPostsAnalyzed} posts</div>
    </div>

    <!-- Engagement -->
    <div class="section">
      <div class="section-head">
        <div class="section-icon">💬</div>
        <div class="section-title">Engagement</div>
      </div>
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-value blue">${metrics.engagementRate}%</div>
          <div class="metric-label">Engagement Rate</div>
          <div class="metric-context">avg across last ${metrics.totalPostsAnalyzed} posts</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${formatNum(metrics.avgLikes)}</div>
          <div class="metric-label">Avg Likes</div>
          <div class="metric-context">per post</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${formatNum(metrics.avgComments)}</div>
          <div class="metric-label">Avg Comments</div>
          <div class="metric-context">per post</div>
        </div>
        <div class="metric-card">
          <div class="metric-value green">${metrics.postsPerWeek}x</div>
          <div class="metric-label">Posts / Week</div>
          <div class="metric-context">posting frequency</div>
        </div>
      </div>
    </div>

    <!-- Reach -->
    ${metrics.reachRate !== null ? `
    <div class="section">
      <div class="section-head">
        <div class="section-icon">📡</div>
        <div class="section-title">Reach</div>
      </div>
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-value blue">${metrics.reachRate}%</div>
          <div class="metric-label">Reach Rate</div>
          <div class="metric-context">avg views vs followers</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${formatNum(metrics.avgVideoViews)}</div>
          <div class="metric-label">Avg Views</div>
          <div class="metric-context">per reel</div>
        </div>
        ${metrics.likeToViewRatio !== null ? `
        <div class="metric-card">
          <div class="metric-value">${metrics.likeToViewRatio}%</div>
          <div class="metric-label">Like / View</div>
          <div class="metric-context">likes per 100 views</div>
        </div>` : ''}
        ${metrics.commentToViewRatio !== null ? `
        <div class="metric-card">
          <div class="metric-value">${metrics.commentToViewRatio}%</div>
          <div class="metric-label">Comment / View</div>
          <div class="metric-context">comments per 100 views</div>
        </div>` : ''}
      </div>
    </div>` : ''}

    <!-- Timing -->
    <div class="section">
      <div class="section-head">
        <div class="section-icon">📅</div>
        <div class="section-title">Timing</div>
      </div>
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-value blue">${metrics.bestDay}</div>
          <div class="metric-label">Best Day</div>
          <div class="metric-context">highest avg engagement</div>
        </div>
        <div class="metric-card">
          <div class="metric-value">${metrics.postsPerWeek}x</div>
          <div class="metric-label">Per Week</div>
          <div class="metric-context">posting frequency</div>
        </div>
      </div>
    </div>
    
    <!-- Talk to Vikram -->
    <div class="section">
      <div class="section-head">
        <div class="section-icon">🤖</div>
        <div class="section-title">Want to go deeper?</div>
      </div>
      <div class="vikram-cta">
        <div class="vikram-cta-label">Your AI Brand Manager</div>
        <div class="vikram-cta-title">Talk to Vikram about your numbers</div>
        <div class="vikram-cta-desc">Vikram has already looked at your profile data and is ready to help you understand what the numbers mean, what's working, and exactly what to do next to grow.</div>
        <button class="vikram-cta-btn" onclick="window.location='vikram.html'">
          Chat with Vikram →
        </button>
      </div>
    </div>
    
    <!-- Hashtags -->
    ${metrics.topHashtags.length > 0 ? `
    <div class="section">
      <div class="section-head">
        <div class="section-icon">#️⃣</div>
        <div class="section-title">Top Hashtags</div>
      </div>
      <div class="hashtag-cloud">
        ${metrics.topHashtags.map(h => `<div class="hashtag-pill">#${h.tag}<span class="count">×${h.count}</span></div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Best Post -->
    ${metrics.bestPost ? `
    <div class="section">
      <div class="section-head">
        <div class="section-icon">🏆</div>
        <div class="section-title">Best Post</div>
      </div>
      <div class="post-card">
        ${metrics.bestPost.display_url
          ? `<img class="post-thumb" src="${metrics.bestPost.display_url}" alt="post">`
          : `<div class="post-thumb-placeholder">📸</div>`}
        <div class="post-info">
          <div class="post-type-badge ${(metrics.bestPost.type||'').toLowerCase()}">${getTypeEmoji(metrics.bestPost.type)} ${metrics.bestPost.type||'Post'}</div>
          <div class="post-caption">${metrics.bestPost.caption||'No caption'}</div>
          <div class="post-stats">
            <div class="post-stat">❤️ <span>${formatNum(metrics.bestPost.likes_count)}</span></div>
            <div class="post-stat">💬 <span>${formatNum(metrics.bestPost.comments_count)}</span></div>
            ${metrics.bestPost.video_view_count ? `<div class="post-stat">👁 <span>${formatNum(metrics.bestPost.video_view_count)}</span></div>` : ''}
          </div>
        </div>
      </div>
    </div>` : ''}

    <!-- Weekly Report -->
    <div class="section">
      <div class="section-head">
        <div class="section-icon">📆</div>
        <div class="section-title">Weekly Report</div>
      </div>
      ${renderGrowthSection(growth?.weeklyGrowth, 'weekly')}
    </div>

    <!-- Monthly Report -->
    <div class="section">
      <div class="section-head">
        <div class="section-icon">🗓️</div>
        <div class="section-title">Monthly Report</div>
      </div>
      ${renderGrowthSection(growth?.monthlyGrowth, 'monthly')}
    </div>

  `
}

init()

</script>

</body>
</html>
